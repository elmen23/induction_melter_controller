name: Build Firmware

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [esp32-release, esp32-debug]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}

      - name: Build firmware (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: Build filesystem (LittleFS)
        run: pio run -e ${{ matrix.env }} --target buildfs

      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.env }}-${{ github.sha }}
          path: .pio/build/${{ matrix.env }}/*.bin
          if-no-files-found: warn

  # ═══════════════════════════════════════════
  #  Release — يبني الكل ويرفع مع الإصدار
  # ═══════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install -U platformio

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}

      - name: Build all environments
        run: |
          pio run -e esp32-release
          pio run -e esp32-debug

      - name: Build filesystems
        run: |
          pio run -e esp32-release --target buildfs
          pio run -e esp32-debug --target buildfs

      - name: Package binaries
        run: |
          mkdir -p release
          for env in esp32-release esp32-debug; do
            mkdir -p release/$env
            cp .pio/build/$env/firmware.bin    release/$env/ 2>/dev/null || true
            cp .pio/build/$env/partitions.bin  release/$env/ 2>/dev/null || true
            cp .pio/build/$env/bootloader.bin  release/$env/ 2>/dev/null || true
            cp .pio/build/$env/littlefs.bin    release/$env/ 2>/dev/null || true
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
