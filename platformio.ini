; =============================================================
;  Induction Melting Controller — PlatformIO configuration
;  Hardware: ESP32 (DevKit v1 / WROOM-32)
;  Target  : 1-channel induction heater for melting metals
; =============================================================

[platformio]
default_envs = esp32-release
src_dir      = src
include_dir  = include
data_dir     = data
test_dir     = test
build_dir    = .pio/build

; -------------------------------------------------------------
;  Common toolchain + flags
; -------------------------------------------------------------
[env]
platform        = espressif32 @ ^6.5.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_filters = time, esp32_exception, color
upload_speed    = 921600
board_build.partitions = min_spiffs.csv
board_build.filesystem  = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=16384
    -DCONFIG_ARDUINO_RUNNING_CORE=1
    -DCONFIG_ARDUINO_EVENT_RUNNING_CORE=1
    -Wno-unused-variable
    -Wno-unused-function

lib_deps =
    ; Physical buttons
    mathertel/OneButton@^2.0.3
    ; PID controller
    br3ttb/PID@^1.2.1
    ; JSON for REST / WS payloads
    bblanchon/ArduinoJson@^7.0.4
    ; Async web server + websocket
    me-no-dev/ESPAsyncWebServer@^1.2.4
    me-no-dev/AsyncTCP@^1.1.1

lib_ignore =
    ESP32BLEArduino
    BLE

; -------------------------------------------------------------
;  Debug build: full assertions, verbose logging, slower loop
; -------------------------------------------------------------
[env:esp32-debug]
extends    = env
build_type = debug
build_flags =
    ${env.build_flags}
    -DCONTROLLER_DEBUG=1
    -DLOG_LEVEL=4
    -O0
    -g3
monitor_filters = default, esp32_exception_decoder, color

; -------------------------------------------------------------
;  Release build: optimised, minimal logs
; -------------------------------------------------------------
[env:esp32-release]
extends    = env
build_type = release
build_flags =
    ${env.build_flags}
    -DCONTROLLER_DEBUG=0
    -DLOG_LEVEL=2
    -O2
    -DNDEBUG
